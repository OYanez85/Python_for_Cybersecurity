name: Safety Dependency Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "0 3 * * 1"  # weekly Monday 03:00 UTC scan (optional)

jobs:
  safety-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project dependencies
        run: |
          python -m pip install -U pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Install Safety
        run: pip install -U safety

      - name: Export environment to a lock file for scanning
        run: pip freeze > safety-requirements.txt

      - name: Run Safety scan (fail on vulnerabilities)
        env:
          SAFETY_API_KEY: ${{ secrets.SAFETY_API_KEY }}
        run: |
          safety scan --file safety-requirements.txt --full-report

      # Optional: keep a JSON artifact
      - name: Save JSON report (optional)
        if: always()
        env:
          SAFETY_API_KEY: ${{ secrets.SAFETY_API_KEY }}
        run: safety scan --file safety-requirements.txt --output json > safety-report.json || true

      - name: Upload report artifact (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: safety-report
          path: safety-report.json
